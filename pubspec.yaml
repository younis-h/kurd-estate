name: kurd_estate
description: "Kurd Estate - Professional Real Estate Platform for Iraq & Kurdistan"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.9.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Backend
  supabase_flutter: ^2.8.4

  # Dependency Injection
  get_it: ^8.0.3

  # Local Storage
  shared_preferences: ^2.3.5
  flutter_secure_storage: ^9.2.4

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/lottie/
    - assets/translations/
    - assets/logos/

 